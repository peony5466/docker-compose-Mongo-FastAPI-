version: '3.8'

services:

  db_mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --quiet --eval 'let n=db.getSiblingDB(\"blog_db\").posts.countDocuments(); if(n!==5){quit(1);}' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend

  db_mysql:
    image: mysql:8.0
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sqlfiles:/docker-entrypoint-initdb.d
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -p$$MYSQL_ROOT_PASSWORD -e 'SELECT COUNT(*) FROM ynov_ci.users HAVING COUNT(*) = 4' | grep -q 4 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend

  admin_mysql:
    image: adminer
    restart: on-failure
    ports:
      - '8080:8080'
    depends_on:
      db_mysql:
        condition: service_healthy
    networks:
      - backend

  admin_mongo:
    image: mongo-express
    restart: on-failure
    ports:
      - '8081:8081'
    env_file: .env
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@db_mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      db_mongo:
        condition: service_healthy
    networks:
      - backend

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file: .env
    restart: on-failure
    volumes:
      - ./api:/app
    depends_on:
      db_mysql:
        condition: service_healthy
      db_mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend

volumes:
  mongo_data:
  mysql_data:

networks:
  backend:
    driver: bridge
