name: Build and Test Application

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image API FastAPI
        run: docker build -t my-app:1.0.0 -f ./api/Dockerfile ./api

      - name: Docker Scout Scan - bloque si CRITICAL
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: my-app:1.0.0
          only-severities: critical
          exit-code: true

      - name: Trivy scan mysql - rapport uniquement sans bloquer
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mysql:8.0
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  integration_tests:
    runs-on: ubuntu-latest
    needs: build_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Générer le fichier .env depuis les secrets GitHub
        run: |
          cat <<EOF > .env
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=ynov_ci
          MONGO_ROOT_USERNAME=root
          MONGO_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          MONGO_URI=mongodb://root:${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}@db_mongo:27017/?authSource=admin
          EOF
          echo "Fichier .env généré avec succès"

      - name: Lancer la stack Docker Compose
        run: |
          echo "=== LANCEMENT DE LA STACK ==="
          docker compose up -d --build
          echo "Stack lancée"

      - name: Script de santé - attendre que tous les services soient healthy
        run: |
          echo "=== DEBUT DU HEALTHCHECK ==="
          MAX=12
          WAIT=5
          echo "Stratégie : $MAX tentatives toutes les ${WAIT}s (max $((MAX * WAIT))s)"

          for i in $(seq 1 $MAX); do
            echo "--- Tentative $i / $MAX ---"

            STATUSES=$(docker compose ps --format json | jq -r 'if type=="array" then .[].Health else .Health end' 2>/dev/null || echo "starting")
            echo "Statuts actuels : $STATUSES"

            if echo "$STATUSES" | grep -qE "starting|unhealthy"; then
              echo "Services pas encore prêts, attente ${WAIT}s..."
              sleep $WAIT
              continue
            fi

            HEALTHY=$(echo "$STATUSES" | grep -c "healthy" || true)
            echo "Nombre de services healthy : $HEALTHY"

            if [ "$HEALTHY" -ge 3 ]; then
              echo "=== TOUS LES SERVICES SONT HEALTHY ==="
              docker compose ps
              exit 0
            fi

            echo "Pas assez de services healthy, attente ${WAIT}s..."
            sleep $WAIT
          done

          echo "=== TIMEOUT : services non healthy apres $((MAX * WAIT))s ==="
          docker compose ps
          docker compose logs
          exit 1

      - name: Validation fonctionnelle - GET /posts (MongoDB)
        run: |
          echo "=== TEST CURL /posts ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/posts)
          echo "HTTP status /posts : $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ /posts OK - MongoDB répond correctement"
            curl -s http://localhost:8000/posts
          else
            echo "❌ /posts KO - status $STATUS"
            exit 1
          fi

      - name: Validation fonctionnelle - GET /users (MySQL)
        run: |
          echo "=== TEST CURL /users ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/users)
          echo "HTTP status /users : $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ /users OK - MySQL répond correctement"
            curl -s http://localhost:8000/users
          else
            echo "❌ /users KO - status $STATUS"
            exit 1
          fi

      - name: Logs complets en cas d echec
        if: failure()
        run: docker compose logs

  push_to_registry:
    runs-on: ubuntu-latest
    needs: integration_tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push image finale sur Docker Hub tag latest
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-hybrid:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
