name: Build and Test Application

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for scanning
        run: docker build -t my-app:1.0.0 -f ./api/Dockerfile ./api

      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: my-app:1.0.0
          only-severities: critical,high
          exit-code: false

      - name: Trivy scan mongo
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mongo:6.0
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Trivy scan mysql
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mysql:8.0
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  integration_tests:
    runs-on: ubuntu-latest
    needs: build_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Générer le fichier .env
        run: |
          cat <<EOF > .env
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=ynov_ci
          MONGO_ROOT_USERNAME=root
          MONGO_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          MONGO_URI=mongodb://root:${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}@db_mongo:27017/?authSource=admin
          EOF

      - name: Lancer la stack
        run: docker compose up -d --build

      - name: Attendre que les services soient healthy
        run: |
          for i in $(seq 1 24); do
            echo "Tentative $i/24"
            STATUSES=$(docker compose ps --format json | jq -r '.[].Health' 2>/dev/null)
            echo "$STATUSES"
            if echo "$STATUSES" | grep -qE "starting|unhealthy"; then
              sleep 5
              continue
            fi
            HEALTHY=$(echo "$STATUSES" | grep -c "healthy" || true)
            if [ "$HEALTHY" -ge 3 ]; then
              echo "Tous les services sont healthy"
              docker compose ps
              exit 0
            fi
            sleep 5
          done
          echo "Timeout"
          docker compose logs
          exit 1

      - name: Test route /posts
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/posts)
          echo "HTTP /posts : $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Test route /users
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/users)
          echo "HTTP /users : $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Logs si echec
        if: failure()
        run: docker compose logs

  push_to_registry:
    runs-on: ubuntu-latest
    needs: integration_tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-hybrid:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
